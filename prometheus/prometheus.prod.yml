global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    # Replace with the real Grafana URL for the deployed environment.
    grafana_base_url: https://grafana.example.com

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'agent-api'
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'agent-api-1:8080'
          - 'agent-api-2:8080'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
