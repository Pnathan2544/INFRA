# Alerts cover runtime signals CI cannot: availability, traffic, latency,
# server errors, and rejection behavior.
#
# Metric contract used here:
# - agent_requests_total{route, prompt_version}
# - agent_rejections_total{prompt_version, reason}
# - agent_request_outcomes_total{route, status_code, outcome, prompt_version}
# - agent_request_latency_seconds_bucket{route, prompt_version, le}

groups:
  - name: agent-api-availability
    rules:
      - alert: AgentAPIDown
        expr: up{job="agent-api"} == 0 or absent(up{job="agent-api"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent API is unavailable"
          description: "Prometheus cannot scrape the agent-api target, or the target is missing from discovery, for more than 1 minute."
          investigation: "Check docker compose service status, agent-api logs, Prometheus targets, and the /healthz endpoint."
          dashboard: "Grafana Agent Monitoring: service availability"

  - name: agent-api-traffic
    rules:
      # The traffic generator should produce continuous /ask traffic in this repo.
      - alert: AskTrafficAbsent
        expr: |
          (
            sum(increase(agent_requests_total{route="/ask"}[5m])) < 1
          )
          or
          absent_over_time(agent_requests_total{route="/ask"}[5m])
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No /ask traffic observed"
          description: "No /ask requests have been observed for a sustained period, even though synthetic traffic should be continuous."
          investigation: "Check traffic-generator logs, Docker Compose networking, /ask route behavior, and whether request metric labels changed."
          dashboard: "Grafana Agent Monitoring: request throughput"

  - name: agent-api-latency
    rules:
      # Volume guards keep p95 alerts from firing on tiny samples.
      - alert: AskLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(agent_request_latency_seconds_bucket{route="/ask"}[5m])
            )
          ) > 1
          and
          sum(increase(agent_requests_total{route="/ask"}[5m])) >= 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High /ask latency"
          description: "p95 /ask latency has been above 1 second for 5 minutes with enough traffic to make the sample meaningful."
          investigation: "Check agent-api CPU/memory, request latency panels, recent deployments, and whether eval or synthetic traffic is causing contention."
          dashboard: "Grafana Agent Monitoring: latency"

      - alert: CriticalAskLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(agent_request_latency_seconds_bucket{route="/ask"}[5m])
            )
          ) > 2.5
          and
          sum(increase(agent_requests_total{route="/ask"}[5m])) >= 20
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical /ask latency"
          description: "p95 /ask latency has been above 2.5 seconds for 10 minutes with enough traffic to indicate sustained user impact."
          investigation: "Check agent-api logs, host resource pressure, container restarts, dependency errors, and recent deployment manifests."
          dashboard: "Grafana Agent Monitoring: latency"

  - name: agent-api-errors
    rules:
      # Unexpected errors are server-side failures, not normal reject/invalid flows.
      - alert: AskUnexpectedErrors
        expr: |
          sum(
            increase(agent_request_outcomes_total{route="/ask", outcome="unexpected_error"}[10m])
          ) >= 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Unexpected /ask errors observed"
          description: "At least 3 unexpected /ask errors have occurred in the last 10 minutes."
          investigation: "Check agent-api logs, recent code changes, malformed edge-case payloads, and whether errors correlate with prompt_version or deployment manifest changes."
          dashboard: "Grafana Agent Monitoring: request outcomes"

  - name: agent-api-behavior
    rules:
      # Synthetic traffic defaults to about 15% rejection-triggering prompts.
      # The 35% and 60% thresholds catch drift without paging on normal mix.
      # The 30-request guard keeps ratios meaningful at the default traffic rate.
      - alert: HighRejectionRate
        expr: |
          (
            sum(rate(agent_rejections_total[5m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[5m]))
          ) > 0.35
          and
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High rejection rate"
          description: "More than 35% of /ask traffic is being rejected for a sustained period, above the expected synthetic baseline of about 15%."
          investigation: "Check recent deployments, prompt_version changes, rejection reason breakdown, and whether traffic has shifted toward adversarial prompts."
          dashboard: "Grafana Agent Monitoring: rejections by reason"

      - alert: VeryHighRejectionRate
        expr: |
          (
            sum(rate(agent_rejections_total[5m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[5m]))
          ) > 0.60
          and
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Very high rejection rate"
          description: "More than 60% of /ask traffic is being rejected for a sustained period, meaning the service is rejecting most requests."
          investigation: "Treat as possible prompt/classifier regression, attack traffic, or severe over-rejection. Compare deployment manifest, eval results, and rejection reasons."
          dashboard: "Grafana Agent Monitoring: rejections by reason"

      - alert: RejectionRateSpike
        expr: |
          (
            sum(rate(agent_rejections_total[5m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[5m]))
          )
          >
          2 *
          (
            sum(rate(agent_rejections_total[30m] offset 5m))
            /
            sum(rate(agent_requests_total{route="/ask"}[30m] offset 5m))
          )
          and
          (
            sum(rate(agent_rejections_total[5m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[5m]))
          ) > 0.30
          and
          (
            sum(rate(agent_rejections_total[30m] offset 5m))
            /
            sum(rate(agent_requests_total{route="/ask"}[30m] offset 5m))
          ) > 0.05
          and
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rejection rate spike"
          description: "Current 5-minute rejection rate is more than 2x the prior 30-minute baseline, above 30% absolute, and backed by enough traffic."
          investigation: "Compare current rejection reasons to the previous baseline and check whether traffic mix, prompt_version, or classifier behavior changed."
          dashboard: "Grafana Agent Monitoring: rejection rate and reason breakdown"

      - alert: HighRejectionsByReason
        expr: |
          (
            sum by (reason, prompt_version) (
              increase(agent_rejections_total[10m])
            )
            /
            ignoring(reason) group_left
            sum by (prompt_version) (
              increase(agent_requests_total{route="/ask"}[10m])
            )
          ) > 0.25
          and
          sum by (reason, prompt_version) (
            increase(agent_rejections_total[10m])
          ) >= 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High {{ $labels.reason }} rejections"
          description: "Rejection reason {{ $labels.reason }} for prompt version {{ $labels.prompt_version }} accounts for more than 25% of /ask traffic with at least 10 events."
          investigation: "Use the reason label to separate likely prompt injection, secrets request, and dangerous action patterns before escalating."
          dashboard: "Grafana Agent Monitoring: rejections by reason"
