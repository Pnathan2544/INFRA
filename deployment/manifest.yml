# =============================================================
# Deployment Manifest Contract
# =============================================================
# Runtime deployment manifests are generated by CI/CD and uploaded as workflow
# artifacts. The production deploy path no longer commits generated manifests
# back to main; deployed state is recorded with the release bundle on the Docker
# VM and in GitHub deployment artifacts.
# =============================================================

apiVersion: v1
kind: deployment
metadata:
  name: agent-api
  environment: production
  commit_sha: generated-by-ci
  image_ref: ghcr.io/owner/repo/agent-api@sha256:generated-by-ci
  deployed_by: github-actions
  deployed_at: generated-by-ci
  eval_artifact: generated-by-ci
  dashboard_url: generated-by-ci
  runbook_url: docs/incident-response.md
  rollback_command: workflow_dispatch rollback environment=production target_sha=<previous-release>

spec:
  replicas: 2
  prompt_version: v1.0.0
  classifier_rules_version: rules-v1.0.0
  health:
    live: /livez
    ready: /readyz
  container:
    name: agent-api
    image: ghcr.io/owner/repo/agent-api@sha256:generated-by-ci
    port: 8080
