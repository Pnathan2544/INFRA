# CI validates these rules before deployment. Thresholds here are starter SLO
# defaults until real production baselines exist; tune by environment, traffic
# source, customer segment, and prompt/classifier version as the service matures.
# Environment and Grafana links come from Prometheus external_labels so the same
# rule file works for the local stack and optional production deployment.

groups:
  - name: agent-api-availability
    rules:
      - alert: AgentAPIScrapeFailed
        expr: up{job="agent-api"} == 0
        for: 1m
        labels:
          severity: page
          team: platform
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Agent API scrape failed"
          description: "Prometheus cannot scrape at least one agent-api target for more than 1 minute."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=8"
          runbook_url: "docs/incident-response.md#confirm-the-alert-is-real"

      - alert: AgentAPIMissingMetrics
        expr: absent_over_time(agent_requests_total[10m])
        for: 2m
        labels:
          severity: ticket
          team: platform
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Agent API request metric is missing"
          description: "agent_requests_total has been absent for 10 minutes. This usually means instrumentation changed, scraping broke, or the service stopped receiving traffic."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring"
          runbook_url: "docs/incident-response.md#confirm-the-alert-is-real"

      - alert: AskTrafficAbsent
        expr: |
          (
            sum(increase(agent_requests_total{route="/ask"}[5m])) < 1
          )
          or
          absent_over_time(agent_requests_total{route="/ask"}[5m])
        for: 5m
        labels:
          severity: ticket
          team: api
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "No /ask traffic observed"
          description: "No /ask requests have been observed for a sustained period. This is ticket-level unless synthetic traffic should be continuous in this environment."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=1"
          runbook_url: "docs/incident-response.md#determine-user-impact"

  - name: agent-api-slo-burn
    rules:
      - alert: AgentAPIAvailabilityBurnRateFast
        expr: |
          (
            sum(rate(agent_request_outcomes_total{route="/ask",status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(agent_request_outcomes_total{route="/ask"}[5m])), 1e-9)
          ) > (14.4 * 0.001)
          and
          (
            sum(rate(agent_request_outcomes_total{route="/ask",status_code=~"5.."}[30m]))
            /
            clamp_min(sum(rate(agent_request_outcomes_total{route="/ask"}[30m])), 1e-9)
          ) > (6 * 0.001)
        for: 2m
        labels:
          severity: page
          team: api
          environment: '{{ $externalLabels.environment }}'
          slo: availability
        annotations:
          summary: "Fast availability SLO burn"
          description: "/ask 5xx error ratio is burning a 99.9% availability budget quickly across 5m and 30m windows."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=9"
          runbook_url: "docs/incident-response.md#check-invalid-requests-and-outcomes"

      - alert: AgentAPILatencyBurnRateFast
        expr: |
          (
            1 -
            (
              sum(rate(agent_request_latency_seconds_bucket{route="/ask",le="1.0"}[5m]))
              /
              clamp_min(sum(rate(agent_request_latency_seconds_count{route="/ask"}[5m])), 1e-9)
            )
          ) > (14.4 * 0.05)
          and
          (
            1 -
            (
              sum(rate(agent_request_latency_seconds_bucket{route="/ask",le="1.0"}[30m]))
              /
              clamp_min(sum(rate(agent_request_latency_seconds_count{route="/ask"}[30m])), 1e-9)
            )
          ) > (6 * 0.05)
        for: 2m
        labels:
          severity: page
          team: api
          environment: '{{ $externalLabels.environment }}'
          slo: latency
        annotations:
          summary: "Fast latency SLO burn"
          description: "More than the allowed share of /ask requests are slower than 1 second across 5m and 30m windows."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=4"
          runbook_url: "docs/incident-response.md#check-latency-and-resource-pressure"

  - name: agent-api-errors
    rules:
      - alert: AgentAPIErrorRateHigh
        expr: |
          (
            sum(rate(agent_request_outcomes_total{route="/ask",status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(agent_request_outcomes_total{route="/ask"}[5m])), 1e-9)
          ) > 0.02
          and
          sum(increase(agent_request_outcomes_total{route="/ask"}[10m])) >= 30
        for: 5m
        labels:
          severity: page
          team: api
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "High /ask error rate"
          description: "More than 2% of /ask traffic is returning 5xx responses with enough traffic to indicate user impact."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=9"
          runbook_url: "docs/incident-response.md#check-invalid-requests-and-outcomes"

      - alert: AgentAPIInvalidRequestRateHigh
        expr: |
          (
            sum(rate(agent_invalid_requests_total{route="/ask"}[5m]))
            /
            clamp_min(sum(rate(agent_requests_total{route="/ask"}[5m])), 1e-9)
          ) > 0.10
          and
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 10m
        labels:
          severity: ticket
          team: product
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "High invalid request rate"
          description: "More than 10% of /ask traffic is malformed or schema-invalid, suggesting client integration drift or abuse traffic."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=10"
          runbook_url: "docs/incident-response.md#check-invalid-requests-and-outcomes"

  - name: agent-api-latency
    rules:
      - alert: AskLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, prompt_version) (
              rate(agent_request_latency_seconds_bucket{route="/ask"}[5m])
            )
          ) > 1
          and on()
          sum(increase(agent_requests_total{route="/ask"}[5m])) >= 20
        for: 5m
        labels:
          severity: ticket
          team: api
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "High /ask latency"
          description: "p95 /ask latency has been above 1 second for 5 minutes with enough traffic to make the sample meaningful."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=4"
          runbook_url: "docs/incident-response.md#check-latency-and-resource-pressure"

      - alert: CriticalAskLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, prompt_version) (
              rate(agent_request_latency_seconds_bucket{route="/ask"}[5m])
            )
          ) > 2.5
          and on()
          sum(increase(agent_requests_total{route="/ask"}[5m])) >= 20
        for: 10m
        labels:
          severity: page
          team: api
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Critical /ask latency"
          description: "p95 /ask latency has been above 2.5 seconds for 10 minutes with enough traffic to indicate sustained user impact."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=4"
          runbook_url: "docs/incident-response.md#check-latency-and-resource-pressure"

  - name: agent-api-safety
    rules:
      - alert: HighRejectionRate
        expr: |
          (
            sum by (prompt_version) (rate(agent_rejections_total[5m]))
            /
            clamp_min(sum by (prompt_version) (rate(agent_requests_total{route="/ask"}[5m])), 1e-9)
          ) > 0.35
          and on()
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 10m
        labels:
          severity: ticket
          team: safety
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "High rejection rate for prompt version {{ $labels.prompt_version }}"
          description: "More than 35% of /ask traffic is being rejected for a prompt version. Tune this by real production source/customer baselines."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=2"
          runbook_url: "docs/incident-response.md#inspect-the-rejection-breakdown"

      - alert: VeryHighRejectionRate
        expr: |
          (
            sum by (prompt_version) (rate(agent_rejections_total[5m]))
            /
            clamp_min(sum by (prompt_version) (rate(agent_requests_total{route="/ask"}[5m])), 1e-9)
          ) > 0.60
          and on()
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 10m
        labels:
          severity: page
          team: safety
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Very high rejection rate for prompt version {{ $labels.prompt_version }}"
          description: "More than 60% of /ask traffic is being rejected for a prompt version, meaning the service may be blocking most users or seeing active abuse."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=2"
          runbook_url: "docs/incident-response.md#mitigate-immediately-when"

      - alert: RejectionRateSpike
        expr: |
          (
            sum(rate(agent_rejections_total[5m]))
            /
            clamp_min(sum(rate(agent_requests_total{route="/ask"}[5m])), 1e-9)
          )
          >
          2 *
          (
            sum(rate(agent_rejections_total[30m] offset 5m))
            /
            clamp_min(sum(rate(agent_requests_total{route="/ask"}[30m] offset 5m)), 1e-9)
          )
          and
          (
            sum(rate(agent_rejections_total[5m]))
            /
            clamp_min(sum(rate(agent_requests_total{route="/ask"}[5m])), 1e-9)
          ) > 0.30
          and
          sum(increase(agent_requests_total{route="/ask"}[10m])) >= 30
        for: 5m
        labels:
          severity: ticket
          team: safety
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Rejection rate spike"
          description: "Current rejection rate is more than 2x the prior 30-minute baseline and above 30% absolute."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=2"
          runbook_url: "docs/incident-response.md#inspect-the-rejection-breakdown"

      - alert: HighRejectionsByReason
        expr: |
          (
            sum by (reason, prompt_version) (
              increase(agent_rejections_total[10m])
            )
            /
            ignoring(reason) group_left
            clamp_min(
              sum by (prompt_version) (
                increase(agent_requests_total{route="/ask"}[10m])
              ),
              1
            )
          ) > 0.25
          and
          sum by (reason, prompt_version) (
            increase(agent_rejections_total[10m])
          ) >= 10
        for: 5m
        labels:
          severity: ticket
          team: safety
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "High {{ $labels.reason }} rejections"
          description: "Rejection reason {{ $labels.reason }} for prompt version {{ $labels.prompt_version }} accounts for more than 25% of /ask traffic with at least 10 events."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring?viewPanel=3"
          runbook_url: "docs/incident-response.md#inspect-the-rejection-breakdown"

  - name: agent-api-saturation
    rules:
      - alert: AgentAPIContainerCPUHigh
        expr: |
          sum by (name) (
            rate(container_cpu_usage_seconds_total{name=~"agent-api.*"}[5m])
          ) > 0.85
        for: 10m
        labels:
          severity: ticket
          team: platform
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Agent API container CPU is high"
          description: "An agent-api container has consumed more than 0.85 CPU cores for 10 minutes. Requires cAdvisor metrics."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring"
          runbook_url: "docs/incident-response.md#check-latency-and-resource-pressure"

      - alert: AgentAPIContainerMemoryHigh
        expr: |
          (
            container_memory_working_set_bytes{name=~"agent-api.*"}
            /
            clamp_min(container_spec_memory_limit_bytes{name=~"agent-api.*"}, 1)
          ) > 0.85
          and
          container_spec_memory_limit_bytes{name=~"agent-api.*"} > 0
        for: 10m
        labels:
          severity: ticket
          team: platform
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Agent API container memory is high"
          description: "An agent-api container is using more than 85% of its memory limit for 10 minutes. Requires cAdvisor metrics."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring"
          runbook_url: "docs/incident-response.md#check-latency-and-resource-pressure"

      - alert: AgentAPIContainerRestarted
        expr: changes(container_start_time_seconds{name=~"agent-api.*"}[15m]) > 0
        for: 0m
        labels:
          severity: ticket
          team: platform
          environment: '{{ $externalLabels.environment }}'
        annotations:
          summary: "Agent API container restarted"
          description: "An agent-api container restart was detected in the last 15 minutes. Requires cAdvisor metrics."
          dashboard_url: "{{ $externalLabels.grafana_base_url }}/d/agent-monitoring/agent-api-monitoring"
          runbook_url: "docs/incident-response.md#check-logs-and-service-status"
