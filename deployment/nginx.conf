limit_req_zone $binary_remote_addr zone=ask_limit:10m rate=10r/s;

upstream agent_api {
    server agent-api-1:8080 max_fails=3 fail_timeout=10s;
    server agent-api-2:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 8080;

    location = /livez {
        proxy_pass http://agent_api/livez;
    }

    location = /readyz {
        proxy_pass http://agent_api/readyz;
    }

    location = /healthz {
        proxy_pass http://agent_api/healthz;
    }

    location = /metrics {
        proxy_pass http://agent_api/metrics;
    }

    location = /ask {
        limit_req zone=ask_limit burst=20 nodelay;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
        proxy_pass http://agent_api/ask;
    }
}
