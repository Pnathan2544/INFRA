services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - agent-api-1
      - agent-api-2
    ports:
      - "${PUBLIC_PORT:-8080}:8080"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aiops-network

  agent-api-1:
    image: ${AGENT_API_IMAGE}
    restart: unless-stopped
    environment:
      - PROMPT_VERSION=${PROMPT_VERSION}
      - CLASSIFIER_RULES_VERSION=${CLASSIFIER_RULES_VERSION}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_RAW_PROMPTS=${LOG_RAW_PROMPTS:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aiops-network

  agent-api-2:
    image: ${AGENT_API_IMAGE}
    restart: unless-stopped
    environment:
      - PROMPT_VERSION=${PROMPT_VERSION}
      - CLASSIFIER_RULES_VERSION=${CLASSIFIER_RULES_VERSION}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_RAW_PROMPTS=${LOG_RAW_PROMPTS:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aiops-network

  prometheus:
    image: prom/prometheus:v2.47.0
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
    depends_on:
      - alertmanager
    networks:
      - aiops-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - aiops-network

  grafana:
    image: grafana/grafana:10.1.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aiops-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - aiops-network

networks:
  aiops-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
